<html>
    <head>
        <title>Plots</title>
        <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/formatting.css') }}">
    </head>
    <body>
        <a href="{{ url_for('display_output') }}" class="button">Previous: Display Results</a>
        <p></p>
        {% for plot in plot_filenames %}
            <p>
            <a href="{{ url_for('getplot', filename=plot) }}">{{plot}}</a>
            </p>
        {% endfor %}

    </body>
</html>
