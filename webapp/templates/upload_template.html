<!DOCTYPE html>
<html lang="en">
    <head>
        {% block head %}
        <title>DGE Analysis - 
            {% if title %}
                {{title}}
            {% endif %}</title>
        <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
        <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='css/formatting.css') }}">
        {% endblock %}
    </head>
<body>
    <div id="header">{% block header %}{% endblock %}</div>
    <div id="guts">{% block contents %}{% endblock %}</div>
    <div id="buttons">{% block buttons %}{% endblock %}</div>
</body>
</html>
