<html>
  <head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/results_style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/formatting.css') }}">
  </head>
  <body>
    <table class="header-table">
      <tr>
        <th><a href="{{ url_for('get_unfiltered_tsv') }}" class="button">Download unfiltered output  </a></th>
        {% if filtered_output_exists %}
          <th><a href="{{ url_for('get_filtered_tsv') }}" class="button">Download filtered output  </a></th>
          <label for="output_select">Display:</label>
          <select name="output_select" id="output_select">
            <option value="filtered">Filtered Results</option>
            <option value="unfiltered">Unfiltered Results</option>
          </select>
        {% endif %}
        <th><a href="{{ url_for('index') }}" class="button">Change input files or parameters  </a></th>
        <th><a href="{{ url_for('reset') }}" class="button">New analysis  </a></th>
      </tr>
      </table>
      <br>
    <table class="spicy-table">
      <thead>
        <tr>
          {% for item in cols %}
          <th>{{item}}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for result in data %}
        <tr class = "{{ loop.cycle('normal', 'spicy') }}">
          {% for elem in result %}
          <td>{{elem}}</td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>

<script>
  output_selection = document.getElementById("data_type");
  if (output_selection != null) {
    output_selection.onchange = display_data;
    display_data({{ cols|tojson }}, {{ data|tojson }});
  }

</script>
