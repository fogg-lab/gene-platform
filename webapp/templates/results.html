<html>
  <head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/results_style.css') }}">
  </head>
  <body>
    <table class="spicy-table">
      <thead>
        <tr>
          {% for elem in col_titles %}
          {% for item in elem %}
          <th>{{item}}</th>
          {% endfor %}
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for result in info %}
        <tr class = "{{ loop.cycle('normal', 'spicy') }}">
          {% for elem in result %}
          <td>{{elem}}</td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
