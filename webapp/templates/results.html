<html>
  <head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/results_style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/formatting.css') }}">
  </head>
  <body>
    <p>
      <a href="{{ url_for('get_unfiltered_tsv') }}" class="button">Download unfiltered output  </a>
      <a href="{{ url_for('get_filtered_tsv') }}" class="button">Download filtered output  </a>
      <a href="{{ url_for('reset') }}" class="button">New analysis  </a>
      <a href="{{ url_for('index') }}" class="button">Change input files or parameters  </a>
    </p>
    <table class="spicy-table">
      <thead>
        <tr>
          {% for item in col_titles %}
          <th>{{item}}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for result in info %}
        <tr class = "{{ loop.cycle('normal', 'spicy') }}">
          {% for elem in result %}
          <td>{{elem}}</td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
