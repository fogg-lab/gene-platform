<html>
  <head>
    <title>Results</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/results_style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/formatting.css') }}">
  </head>
  <body>
    <table class="header-table">
      <tr>
        {% if filtered_data %}
          <th><a href="{{ url_for('get_unfiltered_tsv') }}" class="button">Download full output</a></th>
          <th><a href="{{ url_for('get_filtered_tsv') }}" class="button">Download filtered output</a></th>
        {% else %}
          <th><a href="{{ url_for('get_unfiltered_tsv') }}" class="button">Download output</a></th>
        {% endif %}
        <th><a href="{{ url_for('index') }}" class="button">Change input</a></th>
        <th><a href="{{ url_for('reset') }}" class="button">New analysis</a></th>
        <th><a href="{{ url_for('plots') }}" class="button">Plots</a></th>
      </tr>
    </table>
    <br>
    <p></p>
    {% if filtered_data %}
    <div style="width:100%;">
    <div class="output_filter_div">
      <label for="filter_select"><strong>Display:</strong></label>
      <select name="filter_select" id="filter_select">
        <option value="unfiltered">Full Results</option>
        <option value="filtered">Filtered Results</option>
      </select>
    </div>
    <p></p>
    {% endif %}
    <div class="output_filter_div">
      <form onsubmit="return false">
        <label for="sort_select"><strong>Sort by:</strong></label>
        <select name="sort_select" id="sort_select" style="display:inline-block;">
          <option value=""></option>
          {% for colname in cols %}
            <option value={{colname}}>{{colname}}</option>
          {% endfor %}
        </select>
        <select name="sort_order_select" id="sort_order_select" style="display:inline-block;">
          <option value="Ascending">Ascending</option>
          <option value="Descending">Descending</option>
        </select>
        <input type="submit" value="Sort" onclick="display_output()">
      </form>
    </div>
    <p></p>
    <div class="output_filter_div">
      <form onsubmit="return false">
        <label for="search_field"><strong>Find genes:</strong></label>
        <input id="search_field" type="text" value="">
        <input type="submit" value="Search" onclick="display_output()">
      </form>
    </div>
    </div>
    <br>
    
    <form onsubmit="return false" style="margin: 0; padding: 0;">
        <label style="display:inline-block;">Page </label>
        <input style="display:inline-block;" id="page_num_input" type="number" value=1>
        <label style="display:inline-block;" id="total_pages"></label>
        <input style="display:inline-block;" type="submit" value="Go" onclick="display_output()">
    </form>

    <table class="spicy-table" id="output_table">
      <thead>
        <tr>
          {% for colname in cols %}
            <th><div class="spicy-header-div">{{colname}}</div></th>
          {% endfor %}
        </tr>
      </thead>
      <tbody id="output_tbody"></tbody>
    </table>
  </body>
</html>

<script>

  display_filters = {
    "sortIndex": "",
    "search": "",
    "filter": false
  }

  displayed_data = [];
  display_page_num = 1;

  filter_selection = document.getElementById("filter_select");
  sort_selection = document.getElementById("sort_select");
  search_field = document.getElementById("search_field");

  if (filter_selection != null) {
    filter_selection.onchange = display_output;
  }
  display_output();

  function display_output() {
    set_display_filters();
    set_displayed_data();
    go_to_page();
  }

  function set_display_filters() {
    if (
      filter_selection != null &&
      filter_selection.options[filter_selection.selectedIndex].value == "filtered"
    ) {
      display_filters["filter"] = true;
    }
    else {
      display_filters["filter"] = false;
    }
    sort_colname = sort_selection.options[sort_selection.selectedIndex].value;
    if (sort_colname == "") {
      display_filters["sortIndex"] = -1
    }
    else {
      col_names = {{cols|tojson}};
      col_index = col_names.indexOf(sort_colname);
      display_filters["sortIndex"] = col_index
    }
    
    display_filters["search"] = search_field.value;
  }

  function set_displayed_data() {
    if (display_filters["filter"]) {
      displayed_data = {{ filtered_data|tojson }};
    }
    else {
      displayed_data = {{ data|tojson }}
    }
    
    if (display_filters["sortIndex"] != -1) {
      displayed_data = sort_data(displayed_data);
    }

    search_string = display_filters["search"];
    if (search_string != "") {
      displayed_data = search(displayed_data, search_string);
    }
  }

  function populate_rows(start_index, end_index) {
    data = displayed_data.slice(start_index, end_index+1)

    new_output_tbody = document.createElement("tbody");
    new_output_tbody.id = "output_tbody"
    old_output_tbody = document.getElementById("output_tbody");
    old_output_tbody.parentNode.replaceChild(new_output_tbody, old_output_tbody)
    spicy_row = true;
    for (row of data) {
      table_row = new_output_tbody.insertRow();
      if (spicy_row) {
        table_row.className = "spicy";
        spicy_row = false;
      }
      else {
        table_row.className = "normal";
        spicy_row = true;
      }
      for (elem of row) {
        new_cell = table_row.insertCell()
        new_cell.innerHTML = elem;
      }
    }
  }

  function sort_data(data) {

    data.sort(sortFunction)

    sort_order_select = document.getElementById("sort_order_select");
    if (sort_order_select.options[sort_order_select.selectedIndex].text == "Descending") {
      data = data.reverse();
    }

    return data;
  }

  function sortFunction(a, b) {
    i = display_filters["sortIndex"]
    aVal = parseFloat(a[i]);
    if (!isNaN(aVal)) {
      bVal = parseFloat(b[i]);
      if (aVal === bVal) {
        return 0;
      }
      else {
        return (aVal < bVal) ? -1 : 1;
      }
    }
    else if (a[i] === b[i]) {
      return 0;
    }
    else {
      return (a[i] < b[i]) ? -1 : 1;
    }
  }

  function search(data, search_string) {
    search_results = [];
    for (row of data) {
      if (row[0].includes(search_string.toUpperCase())) {
        search_results.push(row)
      }
    }
    data = search_results;
    return data;
  }

  function set_cur_page() {
    document.getElementById("page_num_input").value = display_page_num;
  }

  function get_num_pages() {
    num_rows = displayed_data.length
    num_pages = Math.floor(num_rows/100) + 1
    document.getElementById("total_pages").innerHTML = " of " + num_pages.toString();
    return num_pages
  }

  function go_to_page() {
    page_num_input = document.getElementById("page_num_input")
    page_num = parseInt(page_num_input.value, 10);
    num_pages = get_num_pages();
    if (page_num > num_pages) {
      page_num = 1;
      page_num_input.value = 1;
    }
    start_index = 100 * (page_num - 1);
    end_index = start_index + 100;
    displayed_data_num_rows = displayed_data.length;
    if (displayed_data_num_rows < end_index) {
      end_index = displayed_data_num_rows;
    }
    populate_rows(start_index, end_index);
  }

</script>
